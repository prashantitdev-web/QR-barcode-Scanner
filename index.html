<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QR Barcode Comparator</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #182230;
      padding: 16px;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 18px;
    }
    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 26px;
    }
    .subtitle {
      margin: 0 0 16px;
      text-align: center;
      color: #667085;
      font-size: 15px;
      line-height: 1.5;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    button {
      min-height: 48px;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .primary {
      background: #0b6bcb;
      color: #fff;
    }
    .secondary {
      background: #e8f0fe;
      color: #09539c;
      margin-top: 12px;
    }
    #reader {
      width: 100%;
      min-height: 140px;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 14px;
    }
    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d9e2f0;
      background: #edf4ff;
      font-size: 14px;
      line-height: 1.5;
    }
    .grid, .counter-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    .box, .counter {
      background: #f8fafc;
      border: 1px solid #d9e2f0;
      border-radius: 12px;
      padding: 12px;
    }
    .box h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .value-box {
      background: #eef2f7;
      min-height: 52px;
      padding: 10px;
      border-radius: 10px;
      word-break: break-all;
      font-size: 14px;
    }
    .result {
      margin-top: 16px;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      min-height: 40px;
    }
    .match { color: #157f3b; }
    .failed { color: #c62828; }
    .counter {
      text-align: center;
    }
    .counter span {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      font-weight: 800;
    }
    @media (max-width: 640px) {
      .actions, .grid, .counter-wrap {
        grid-template-columns: 1fr;
      }
      .container { padding: 14px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QR + Barcode Comparator</h1>
    <p class="subtitle">Scan Code 1 first. After that, Code 2 scanner will open automatically. A popup will show match result.</p>

    <div class="actions">
      <button class="primary" onclick="startScan(1)">Scan Code 1</button>
      <button class="primary" onclick="startScan(2)" id="btn2" disabled>Scan Code 2</button>
    </div>

    <button class="secondary" onclick="stopScanner()">Stop Camera</button>

    <div id="reader"></div>
    <div id="status" class="status">Status: Tap Scan Code 1 to start.</div>

    <div class="grid">
      <div class="box">
        <h3>Code 1</h3>
        <div id="code1" class="value-box">Not Scanned</div>
      </div>
      <div class="box">
        <h3>Code 2</h3>
        <div id="code2" class="value-box">Not Scanned</div>
      </div>
    </div>

    <div id="result" class="result"></div>

    <div class="counter-wrap">
      <div class="counter">Match Count<span id="matchCount">0</span></div>
      <div class="counter">Failed Count<span id="failedCount">0</span></div>
    </div>
  </div>

  <script>
    let currentScan = 1;
    let firstCode = '';
    let secondCode = '';
    let matchCount = 0;
    let failedCount = 0;
    let scanner = null;
    let scannerRunning = false;
    let scanLock = false;
    let hasFirst = false;
    let hasSecond = false;

    const resultEl = document.getElementById('result');
    const statusEl = document.getElementById('status');
    const btn2 = document.getElementById('btn2');

    const formatsToSupport = [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E
    ];

    function setStatus(message) {
      statusEl.innerText = 'Status: ' + message;
    }

    async function stopScanner(clearPreview = false) {
      try {
        if (scanner && scannerRunning) {
          await scanner.stop();
        }
      } catch (e) {}
      try {
        if (scanner) {
          await scanner.clear();
        }
      } catch (e) {}
      scanner = null;
      scannerRunning = false;
      scanLock = false;
      if (clearPreview) document.getElementById('reader').innerHTML = '';
    }

    function updateValue(scanNumber, value) {
      if (scanNumber === 1) {
        firstCode = value;
        hasFirst = true;
        document.getElementById('code1').innerText = value;
        btn2.disabled = false;
        setStatus('Code 1 scanned. Now scan Code 2.');
      } else {
        secondCode = value;
        hasSecond = true;
        document.getElementById('code2').innerText = value;
        setStatus('Code 2 scanned. Comparing now...');
      }
    }

    function compareCodes() {
      if (!hasFirst || !hasSecond) return;
      const same = firstCode.trim() === secondCode.trim();

      if (same) {
        resultEl.innerHTML = '✅ MATCH';
        resultEl.className = 'result match';
        matchCount++;
        document.getElementById('matchCount').innerText = matchCount;
        alert('Both QR code matched same');
      } else {
        resultEl.innerHTML = '❌ FAILED';
        resultEl.className = 'result failed';
        failedCount++;
        document.getElementById('failedCount').innerText = failedCount;
        alert('Both QR code not matched');
      }
    }

    async function handleDecoded(decodedText) {
      if (scanLock) return;
      scanLock = true;

      updateValue(currentScan, decodedText);
      await stopScanner();

      if (currentScan === 1) {
        setTimeout(() => startScan(2), 350);
      } else {
        compareCodes();
      }
    }

    async function startScan(scanNumber) {
      currentScan = scanNumber;
      resultEl.innerHTML = '';
      resultEl.className = 'result';
      setStatus('Opening camera for Code ' + scanNumber + '...');

      if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
        setStatus('Camera support not available in this browser.');
        return;
      }

      if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        setStatus('Camera may not open in direct file mode. Use HTTPS or localhost for camera access.');
        return;
      }

      await stopScanner(true);

      try {
        scanner = new Html5Qrcode('reader');
        scannerRunning = true;

        await scanner.start(
          { facingMode: 'environment' },
          {
            fps: 12,
            qrbox: { width: 280, height: 180 },
            aspectRatio: 1.7,
            formatsToSupport: formatsToSupport,
            rememberLastUsedCamera: true,
            showTorchButtonIfSupported: true,
            showZoomSliderIfSupported: true
          },
          async (decodedText) => {
            await handleDecoded(decodedText);
          },
          () => {}
        );

        setStatus('Camera started. Point it at the code.');
      } catch (e) {
        scannerRunning = false;
        setStatus('Camera open nahi hua. Browser permission ya secure mode check karein.');
      }
    }

    window.addEventListener('beforeunload', () => {
      stopScanner(true);
    });
  </script>
</body>
</html>
